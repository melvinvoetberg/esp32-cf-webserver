<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>esp32-cf</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:system-ui,-apple-system,sans-serif;background:#fafafa;color:#222;line-height:1.6;max-width:480px;margin:0 auto;padding:40px 20px}
h1{font-size:1.5em;font-weight:700}
p.sub{color:#999;font-size:.85em;margin:4px 0 32px}
table{width:100%;border-collapse:collapse}
tr{border-bottom:1px solid #eee}
tr:last-child{border-bottom:none}
td{padding:8px 0;font-size:.9em}
td:first-child{color:#999;width:100px}
td:last-child{color:#222;font-family:'SF Mono',ui-monospace,monospace;font-size:.8em}
footer{margin-top:32px;padding-top:16px;border-top:1px solid #eee;font-size:.75em;color:#bbb}
footer a{color:#666;text-decoration:none}
</style>
</head>
<body>
<h1>esp32-cf</h1>
<p class="sub">{{server.hostname}}</p>
<table>
<tr><td>Chip</td><td>{{server.chip}}</td></tr>
<tr><td>IP</td><td>{{server.ip}}</td></tr>
<tr><td>Edge</td><td>{{server.edge}}</td></tr>
<tr><td>Heap</td><td>{{server.heap}} bytes</td></tr>
<tr><td>Uptime</td><td>{{server.uptime}}s</td></tr>
<tr><td>Requests</td><td>{{server.requests}}</td></tr>
<tr><td>WiFi</td><td>{{server.wifi.ssid}} ({{server.wifi.rssi}} dBm)</td></tr>
</table>
<footer>Powered by <a href="https://github.com/melvinvoetberg/esp32-cf">esp32-cf</a></footer>
</body>
</html>
